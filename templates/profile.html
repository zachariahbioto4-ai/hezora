<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookBase — Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:#f3f4f6;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;color:#64748b;cursor:pointer;margin-bottom:2px;text-decoration:none;}
    .nav-item:hover{background:#f8fafc;color:#0f172a;}
    .nav-item.active{background:#eff6ff;color:#2563eb;}
    .tab-btn{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#64748b;}
    .tab-btn.active{background:#eff6ff;color:#2563eb;font-weight:600;}
    input,textarea,select{width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;color:#374151;outline:none;background:white;}
    input:focus,textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.08);}
    label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:6px;}
  </style>
</head>
<body>
  <div style="display:flex;width:100%;max-width:1400px;height:90vh;border-radius:24px;overflow:hidden;background:white;box-shadow:0 20px 60px rgba(0,0,0,0.1);">
    <aside style="width:220px;background:white;border-right:1px solid #f1f5f9;display:flex;flex-direction:column;padding:1.5rem 1rem;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:2rem;padding:0 0.5rem;">
        <div style="width:30px;height:30px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        </div>
        <span style="font-size:17px;font-weight:700;color:#0f172a;">BookBase</span>
      </div>
      <a href="/dashboard/" class="nav-item">Discover</a>
      <a href="/categories/" class="nav-item">Category</a>
      <a href="/library/" class="nav-item">My Library</a>
      <a href="/orders/" class="nav-item">My Orders</a>
      <a href="#" class="nav-item">Audio Books</a>
      <a href="#" class="nav-item">Favourites</a>
      <div style="margin-top:auto;">
        <a href="/profile/" class="nav-item active">Settings</a>
        <a href="/auth/" class="nav-item">Logout</a>
      </div>
    </aside>

    <main style="flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fafafa;">
      <header style="display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;background:white;border-bottom:1px solid #f1f5f9;flex-shrink:0;">
        <div>
          <h1 style="font-size:20px;font-weight:700;color:#0f172a;">Profile & Settings</h1>
          <p style="font-size:13px;color:#94a3b8;margin-top:2px;">Manage your account details</p>
        </div>
      </header>

      <div style="flex:1;overflow-y:auto;padding:2rem;">
        <!-- Avatar Section -->
        <div style="display:flex;align-items:center;gap:1.5rem;background:white;border-radius:18px;padding:1.5rem;border:1px solid #f1f5f9;margin-bottom:1.5rem;">
          <div style="position:relative;">
            <img src="https://i.pravatar.cc/150?img=11" style="width:72px;height:72px;border-radius:50%;object-fit:cover;">
            <button style="position:absolute;bottom:0;right:0;width:24px;height:24px;background:#2563eb;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;">
              <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            </button>
          </div>
          <div>
            <p style="font-size:16px;font-weight:700;color:#0f172a;">Balogun</p>
            <p style="font-size:13px;color:#94a3b8;">balogun@example.com · Member since Jan 2024</p>
          </div>
        </div>

        <!-- Tabs -->
        <div style="display:flex;gap:4px;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:1.5rem;width:fit-content;">
          <button class="tab-btn active" onclick="switchTab('personal',this)">Personal Info</button>
          <button class="tab-btn" onclick="switchTab('security',this)">Security</button>
          <button class="tab-btn" onclick="switchTab('address',this)">Address</button>
        </div>

        <!-- Personal Info Tab -->
        <div id="tab-personal" style="background:white;border-radius:18px;padding:1.75rem;border:1px solid #f1f5f9;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
            <div><label>First Name</label><input type="text" value="Balogun"></div>
            <div><label>Last Name</label><input type="text" value="Adeyemi"></div>
          </div>
          <div style="margin-bottom:1rem;"><label>Email Address</label><input type="email" value="balogun@example.com"></div>
          <div style="margin-bottom:1rem;"><label>Phone Number</label><input type="tel" value="+234 801 234 5678"></div>
          <div style="margin-bottom:1rem;"><label>Date of Birth</label><input type="date" value="1995-06-15"></div>
          <div style="margin-bottom:1.5rem;"><label>Bio</label><textarea rows="3" placeholder="Tell us a little about yourself..."></textarea></div>
          <button style="padding:11px 24px;background:#2563eb;color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;">Save Changes</button>
        </div>

        <!-- Security Tab (hidden) -->
        <div id="tab-security" style="display:none;background:white;border-radius:18px;padding:1.75rem;border:1px solid #f1f5f9;">
          <div style="margin-bottom:1rem;"><label>Current Password</label><input type="password" placeholder="••••••••"></div>
          <div style="margin-bottom:1rem;"><label>New Password</label><input type="password" placeholder="Min. 8 characters"></div>
          <div style="margin-bottom:1.5rem;"><label>Confirm New Password</label><input type="password" placeholder="Repeat new password"></div>
          <button style="padding:11px 24px;background:#2563eb;color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;">Update Password</button>
        </div>

        <!-- Address Tab (hidden) -->
        <div id="tab-address" style="display:none;background:white;border-radius:18px;padding:1.75rem;border:1px solid #f1f5f9;">
          <div style="margin-bottom:1rem;"><label>Street Address</label><input type="text" placeholder="123 Main Street"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
            <div><label>City</label><input type="text" placeholder="Nairobi"></div>
            <div><label>State / Province</label><input type="text" placeholder="Nairobi County"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
            <div><label>ZIP / Postal Code</label><input type="text" placeholder="00100"></div>
            <div><label>Country</label><input type="text" placeholder="Kenya"></div>
          </div>
          <button style="padding:11px 24px;background:#2563eb;color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;">Save Address</button>
        </div>
      </div>
    </main>
  </div>
  <script>
    function switchTab(name, btn) {
      ['personal','security','address'].forEach(t => {
        document.getElementById('tab-'+t).style.display = t===name ? 'block' : 'none';
      });
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
</body>
</html>
